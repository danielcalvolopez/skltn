name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: crates/skltn-obs/dashboard/pnpm-lock.yaml

      - name: Build dashboard frontend
        run: |
          cd crates/skltn-obs/dashboard
          pnpm install --frozen-lockfile
          pnpm build

      - name: Build release binaries
        run: cargo build --release --workspace --target ${{ matrix.target }}

      - name: Package release
        run: |
          VERSION="${GITHUB_REF_NAME}"
          TARGET="${{ matrix.target }}"
          DIST="skltn-${VERSION}-${TARGET}"

          mkdir "$DIST"
          cp "target/${TARGET}/release/skltn" "$DIST/"
          cp "target/${TARGET}/release/skltn-mcp" "$DIST/"
          cp "target/${TARGET}/release/skltn-obs" "$DIST/"
          tar -czf "${DIST}.tar.gz" -C "$DIST" skltn skltn-mcp skltn-obs
          echo "ASSET=${DIST}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
